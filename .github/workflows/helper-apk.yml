name: helper-apk

# Builds the Pane Helper APK and commits it to the repo so the desktop
# release pipeline can bundle it without chaining cross-workflow
# artifacts. Runs only when the helper sources change (or on manual
# dispatch). The committed APK is what the Pane .app installs on the
# user's phone via adb when a new device is added.

on:
  push:
    branches: [main]
    paths:
      - "tools/pane-helper-android/**"
      - ".github/workflows/helper-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build pane-helper.apk
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      - name: Build release APK
        working-directory: tools/pane-helper-android
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Stage APK
        run: |
          set -euo pipefail
          SRC=tools/pane-helper-android/app/build/outputs/apk/release/app-release.apk
          DEST=src-tauri/binaries/pane-helper.apk
          if [ ! -f "$SRC" ]; then
            echo "::error::expected APK at $SRC" >&2
            find tools/pane-helper-android/app/build -name '*.apk' || true
            exit 1
          fi
          mkdir -p src-tauri/binaries
          cp "$SRC" "$DEST"
          ls -la "$DEST"
          sha256sum "$DEST"

      - name: Commit updated APK if it changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src-tauri/binaries/pane-helper.apk; then
            echo "APK unchanged — nothing to commit."
            exit 0
          fi
          git add src-tauri/binaries/pane-helper.apk
          git commit -m "chore(helper): rebuild pane-helper.apk [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
