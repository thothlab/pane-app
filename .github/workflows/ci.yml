name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned — see comment in release.yml. Locked deps don't
      # compile on rustc ≥1.95.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev libsoup-3.0-dev pkg-config
      # Tauri's generate_context!() macro validates frontendDist (../dist)
      # at compile time. We don't want to pull in pnpm + Node + run a real
      # build just for the Rust lint pass, so stub the dir with an empty
      # index.html so the macro is happy.
      - name: Stub frontend dist for Tauri macro
        run: |
          mkdir -p dist
          echo '<!doctype html><html></html>' > dist/index.html
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test-rust:
    runs-on: ubuntu-latest
    needs: lint-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev libsoup-3.0-dev pkg-config
      - name: Stub frontend dist for Tauri macro
        run: |
          mkdir -p dist
          echo '<!doctype html><html></html>' > dist/index.html
      - run: cargo test --workspace --all-features

  lint-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build-tauri:
    needs: [lint-rust, lint-ui]
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-14, ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.1
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - name: Install Tauri Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev libsoup-3.0-dev pkg-config
      - run: pnpm install --frozen-lockfile
      - name: Build (debug — release builds require signing secrets)
        run: pnpm tauri build --debug --no-bundle
