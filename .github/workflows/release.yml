name: release

# Cuts signed Tauri bundles on every `v*` tag (or manual dispatch).
#
# Outputs:
#   - GitHub Release with platform installers attached:
#       * macOS Apple Silicon: .dmg
#       * Linux x86_64:        .AppImage, .deb, .rpm
#       * Windows x86_64:      .msi, .exe (NSIS)
#   - `.sig` minisign signature next to each installer.
#   - Combined `latest.json` updater manifest. The in-app updater
#     pulls this from `releases/latest/download/latest.json` and
#     verifies bundles against the minisign pubkey in tauri.conf.json.
#
# Required secrets (optional — release still produces unsigned
# bundles without them):
#   - TAURI_SIGNING_PRIVATE_KEY            — minisign private key
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD   — its passphrase (empty if none)
#
# Cut a release:
#   1. Bump version in `package.json`, `src-tauri/Cargo.toml`, and
#      `src-tauri/tauri.conf.json`. They must agree.
#   2. `git tag v0.x.y && git push --tags`
#   3. Wait for the matrix to finish, then publish the draft release
#      from the Releases page.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: macos-14,      target: darwin-aarch64,  rust: aarch64-apple-darwin     }
          - { runner: ubuntu-22.04,  target: linux-x86_64,    rust: x86_64-unknown-linux-gnu }
          - { runner: windows-2022,  target: windows-x86_64,  rust: x86_64-pc-windows-msvc   }

        # darwin-x86_64 (Intel Mac) builds on a macos-13 runner — long
        # queue times. Add a separate workflow if/when there's demand.

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust }}

      - uses: Swatinem/rust-cache@v2

      - name: Linux Tauri prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            pkg-config \
            patchelf

      # pnpm version comes from `packageManager` in package.json —
      # passing `version:` here trips ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build + sign Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Pane ${{ github.ref_name }}"
          releaseBody: |
            Pane desktop bundles for ${{ matrix.platform.target }}.

            **Install:**
            - macOS — open the `.dmg`, drag Pane to Applications. On first launch right-click → Open (unsigned builds will be Gatekeeper-blocked otherwise).
            - Linux — `.AppImage` is portable; `.deb`/`.rpm` for system install.
            - Windows — `.msi` (recommended) or `.exe` NSIS installer.

            See https://github.com/thothlab/pane-app for source and docs.
          # Keep the release as a draft until the manifest job
          # uploads `latest.json`. The publish step at the very end
          # of this workflow flips draft=false. Otherwise users
          # could hit a brief window where `releases/latest/download/
          # latest.json` 404s.
          releaseDraft: true
          # Not a prerelease — GitHub's `/releases/latest/download/`
          # only resolves to non-prerelease entries, which is what
          # the updater endpoint relies on.
          prerelease: false
          args: --target ${{ matrix.platform.rust }}

  # Combine the per-platform `*.json` updater manifests that
  # tauri-action emits into one `latest.json`, then mark the release
  # as published. Once this finishes, `releases/latest/download/
  # latest.json` resolves and the in-app updater wakes up.
  publish:
    name: assemble latest.json + publish release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Compose latest.json and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" --pattern '*.json' --dir dist
          python3 .github/scripts/merge-tauri-manifests.py dist > latest.json
          gh release upload "$TAG" latest.json --clobber
          gh release edit "$TAG" --draft=false
